# ============================================================
#  Словарь ударений и замен для озвучки (применяет client/book_parser.py)
#  Формат: слово: "замена"
#  - слово ищется регистронезависимо и только ЦЕЛИКОМ (не как подстрока);
#  - замена подставляется ровно так, как написана здесь;
#  - ударение подсказывается комбинирующим акутом U+0301 сразу после
#    ударной гласной («и́» = «и» + U+0301) — стандартный способ подсказать
#    ударение TTS-моделям;
#  - дополняй по мере находок в озвучке, парсер подхватит при новом прогоне.
#  ВНИМАНИЕ (по итогам прослушки 19.07): акут над «О» в начале слова модель
#  читала как «Ою» («О́рдо» -> «Оюрдо») — ударения на первую гласную
#  добавлять с осторожностью и проверять ушами.
# ============================================================
Джинн: "Джи́нн"
Мондштадт: "Мондшта́дт"
Фавониус: "Фаво́ниус"
